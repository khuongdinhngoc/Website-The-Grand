server {
  listen 3000;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:jpg|jpeg|png|gif|ico|svg|webp|avif|css|js|woff2?|ttf|otf)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }
}
